<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>ShiftBloom</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ShiftBloom" />
<meta name="theme-color" content="#D8B4E2" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FFFDF8; --bg2:#F4F8FF; --card:#FFFFFF; --ink:#374151; --muted:#6B7280;
    --plum:#4B3B5C; --field:#F5F2FB; --lilac:#C7B8EA; --lilac-soft:#ECE3FA; --purple:#7C5BA6;
    --shadow:0 10px 30px -16px rgba(120,110,160,.45); --shadow-sm:0 6px 18px -12px rgba(120,110,160,.4);
  }
  body.dark{
    --bg:#191820; --bg2:#1E1C26; --card:#262430; --ink:#ECE9F2; --muted:#9E97AC;
    --plum:#E7DEF5; --field:#322E3D; --lilac:#9B82C4; --lilac-soft:#3A3348; --purple:#C9B6E4;
    --shadow:0 10px 30px -16px rgba(0,0,0,.6); --shadow-sm:0 6px 18px -12px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Sarabun',system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--ink);
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;transition:background .3s;}
  ::-webkit-scrollbar{display:none;}
  .wrap{max-width:480px;margin:0 auto;padding:0 0 calc(100px + env(safe-area-inset-bottom));}
  main{padding:0 16px;}
  .card{background:var(--card);border-radius:24px;box-shadow:var(--shadow);}
  .soft{box-shadow:var(--shadow-sm);}
  .row{display:flex;align-items:center;}
  .btn{border:none;font-family:inherit;cursor:pointer;background:none;color:inherit;}
  /* dashboard */
  .dash{padding:calc(22px + env(safe-area-inset-top)) 20px 22px;border-radius:0 0 30px 30px;
    background:linear-gradient(135deg,#D8B4E2 0%,#AFCBFF 55%,#BFE8D8 100%);box-shadow:0 8px 24px -10px rgba(120,110,160,.45);}
  body.dark .dash{background:linear-gradient(135deg,#5B4A77 0%,#3F5680 55%,#3A6157 100%);}
  .greet{font-size:13px;color:#5C4E73;font-weight:500;}
  body.dark .greet{color:#E9DEF7;}
  .uname{font-size:22px;font-weight:700;color:#3F2F52;line-height:1.1;}
  body.dark .uname{color:#F3ECFB;}
  .todayline{font-size:13px;color:#574a6b;margin-top:6px;}
  body.dark .todayline{color:#D9CEEC;}
  .cd{font-weight:700;}
  .dashtop{display:flex;align-items:center;gap:12px;}
  .avatar{width:52px;height:52px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;
    background:rgba(255,255,255,.55);box-shadow:0 4px 14px -6px rgba(120,110,160,.5);cursor:pointer;transition:transform .12s;}
  body.dark .avatar{background:rgba(255,255,255,.12);}
  .avatar:active{transform:scale(.9);}
  .dcards{display:flex;gap:10px;margin-top:16px;overflow-x:auto;scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;padding-bottom:2px;margin-left:-2px;padding-left:2px;}
  .dcard{min-width:148px;width:148px;flex-shrink:0;scroll-snap-align:start;border-radius:22px;padding:14px 16px;
    box-shadow:0 8px 22px -14px rgba(120,110,160,.55);}
  .dcard .lbl{font-size:12px;opacity:.85;}
  .dcard .val{font-size:24px;font-weight:700;margin-top:6px;line-height:1.1;}
  .dcard .sub2{font-size:11px;opacity:.7;margin-top:2px;}
  /* month nav */
  .icon-btn{width:40px;height:40px;border-radius:16px;background:var(--card);color:var(--purple);font-size:20px;
    box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;}
  .month-title{font-weight:600;color:var(--plum);text-align:center;}
  .today-btn{font-size:12px;border-radius:999px;padding:2px 12px;margin-top:2px;background:#FFE8F0;color:#A86B82;}
  body.dark .today-btn{background:#4A2F3D;color:#F4B8CC;}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);}
  .dow div{text-align:center;font-size:12px;padding:4px 0;font-weight:500;color:var(--muted);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cell{min-height:62px;min-width:0;overflow:hidden;border-radius:16px;padding:4px;text-align:left;display:flex;flex-direction:column;background:transparent;border:none;cursor:pointer;position:relative;}
  .cell.sel{background:var(--lilac-soft);outline:2px solid var(--lilac);outline-offset:-2px;}
  .daynum{width:18px;height:18px;line-height:18px;text-align:center;border-radius:999px;font-size:12px;margin-bottom:2px;color:var(--ink);}
  .daynum.today{background:#AFCBFF;color:#fff;font-weight:700;}
  .daynum.sun{color:#FF9C97;}
  .moodtag{position:absolute;top:3px;right:3px;font-size:11px;}
  .badge{font-size:9px;line-height:1.2;border-radius:7px;padding:1px 5px;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;word-break:break-word;}
  .cellrow{display:flex;align-items:flex-start;gap:2px;margin-bottom:2px;}
  .cellrow .badge{flex:1;min-width:0;margin-bottom:0;}
  .cellrow .more{flex-shrink:0;}
  .more{font-size:9px;color:var(--muted);}
  .sec-title{font-weight:600;color:var(--plum);margin:0;}
  .entry{display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;background:var(--card);}
  .av{width:42px;height:42px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .entry .name{font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry .sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .x-btn{width:32px;height:32px;border-radius:999px;background:#FFEDEB;color:#D9776F;flex-shrink:0;font-size:18px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
  body.dark .x-btn{background:#4A2E2C;}
  .quick{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .quick button{border-radius:16px;padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:6px;font-weight:600;font-size:14px;box-shadow:0 4px 12px -7px rgba(120,110,160,.5);border:none;cursor:pointer;}
  .quick .add{background:var(--card);color:var(--purple);border:2px dashed var(--lilac);}
  .arrow{font-size:12px;opacity:.55;}
  .moodpick{display:flex;gap:6px;overflow-x:auto;padding:2px 0;}
  .moodpick button{width:38px;height:38px;border-radius:14px;background:var(--field);font-size:20px;flex-shrink:0;border:none;cursor:pointer;}
  .moodpick button.on{background:var(--lilac-soft);outline:2px solid var(--lilac);}
  /* summary / stats */
  .sumrow{display:flex;align-items:center;gap:8px;}
  .sumav{width:30px;height:30px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .bar{height:7px;border-radius:999px;}
  .filter{border-radius:999px;padding:4px 12px;font-size:12px;font-weight:500;background:var(--field);color:var(--muted);border:none;cursor:pointer;}
  .filter.on{background:var(--lilac-soft);color:var(--purple);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{border-radius:18px;padding:12px 14px;background:var(--field);}
  .stat .lbl{font-size:12px;color:var(--muted);}
  .stat .val{font-size:18px;font-weight:700;color:var(--plum);margin-top:2px;}
  /* manage */
  .mrow{display:flex;align-items:center;gap:8px;padding:12px;border-radius:18px;background:var(--card);}
  .mrow.hidden-duty{opacity:.5;}
  .mrow .av{width:46px;height:46px;}
  .typechip{border-radius:999px;padding:1px 8px;font-size:11px;color:#6B6478;}
  body.dark .typechip{color:#cdbfe0;}
  .stepper{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
  .stepper button{width:26px;height:22px;border-radius:8px;background:var(--lilac-soft);color:var(--purple);font-size:11px;border:none;}
  .stepper button:disabled{opacity:.4;}
  .mini{width:30px;height:30px;border-radius:999px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:none;cursor:pointer;background:var(--field);color:var(--purple);}
  .addbtn{border-radius:16px;padding:8px 12px;font-size:14px;font-weight:600;background:var(--lilac);color:#3F2F52;box-shadow:0 4px 12px -7px rgba(120,110,160,.6);border:none;cursor:pointer;}
  .backup-btn{flex:1;border-radius:16px;padding:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;}
  /* nav */
  nav.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;padding-bottom:env(safe-area-inset-bottom);z-index:30;}
  nav.tabs .inner{margin:10px 12px;border-radius:22px;display:flex;padding:6px;background:var(--card);
    box-shadow:0 8px 28px -10px rgba(120,110,160,.5);}
  body.dark nav.tabs .inner{box-shadow:0 8px 28px -8px rgba(0,0,0,.7);}
  nav.tabs button{flex:1;border-radius:15px;padding:7px 0;font-size:11px;font-weight:600;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;}
  nav.tabs button .ic{font-size:18px;}
  nav.tabs button.on{background:var(--lilac-soft);color:var(--purple);}
  /* FAB */
  .fab{position:fixed;right:calc(16px + env(safe-area-inset-right));bottom:calc(86px + env(safe-area-inset-bottom));z-index:40;
    width:58px;height:58px;border-radius:20px;border:none;cursor:pointer;color:#3F2F52;font-size:30px;line-height:1;
    background:linear-gradient(135deg,#F7C3CF 0%,#D8B4E2 50%,#AFCBFF 100%);
    box-shadow:0 10px 24px -8px rgba(120,90,160,.6);transition:transform .18s;display:flex;align-items:center;justify-content:center;}
  .fab:active{transform:scale(.92);}
  .fab.open{transform:rotate(45deg);}
  .fabwrap{position:fixed;inset:0;z-index:39;display:none;}
  .fabwrap.show{display:block;}
  .fabmenu{position:fixed;right:calc(16px + env(safe-area-inset-right));bottom:calc(154px + env(safe-area-inset-bottom));z-index:41;
    display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  .fabmenu button{display:flex;align-items:center;gap:8px;border:none;cursor:pointer;background:var(--card);color:var(--ink);
    font-family:inherit;font-size:14px;font-weight:600;padding:10px 14px;border-radius:16px;box-shadow:0 8px 20px -10px rgba(120,110,160,.6);
    animation:fabpop .22s cubic-bezier(.2,.8,.3,1.2) backwards;}
  .fabmenu button .fic{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--lilac-soft);}
  @keyframes fabpop{from{opacity:0;transform:translateY(10px) scale(.92);}to{opacity:1;transform:none;}}
  .overlay{animation:fade .18s ease;}
  .sheet{animation:slideup .26s cubic-bezier(.2,.8,.25,1);}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  /* daily notes */
  .note{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:16px;background:var(--card);}
  .note .nbody{flex:1;min-width:0;font-size:14px;color:var(--ink);white-space:pre-wrap;word-break:break-word;}
  .notedot{position:absolute;bottom:3px;right:4px;font-size:9px;}
  .pickrow{display:flex;flex-direction:column;gap:8px;}
  .pickrow button{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;border:none;cursor:pointer;
    background:var(--field);color:var(--ink);font-family:inherit;font-size:15px;font-weight:600;text-align:left;width:100%;}
  /* toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%);bottom:104px;z-index:60;background:var(--plum);color:var(--bg);
    border-radius:999px;padding:8px 16px;font-size:14px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;}
  body:not(.dark) #toast{color:#fff;}
  #toast.show{opacity:1;}
  /* modal */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(50,40,65,.45);display:flex;align-items:flex-end;justify-content:center;}
  .sheet{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;background:var(--card);border-radius:28px 28px 0 0;
    padding:12px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px -12px rgba(120,110,160,.5);}
  .grip{width:40px;height:6px;border-radius:999px;background:var(--field);margin:0 auto 12px;}
  .sheet h3{text-align:center;font-weight:700;color:var(--plum);margin:0 0 16px;}
  .field{margin-bottom:12px;}
  .field>label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin:0 4px 6px;}
  input[type=text],input[type=number],input[type=time],textarea{width:100%;border-radius:16px;padding:10px 12px;border:none;outline:none;
    background:var(--field);color:var(--ink);font-family:inherit;font-size:15px;}
  textarea{resize:none;}
  .emoji-pick{width:36px;height:36px;border-radius:12px;background:var(--field);font-size:18px;flex-shrink:0;border:none;cursor:pointer;}
  .emoji-pick.on{background:var(--lilac-soft);}
  .sw{width:34px;height:34px;border-radius:16px;border:none;cursor:pointer;padding:0;}
  .sw.on{outline:2.5px solid #9B82C4;outline-offset:2px;}
  .sw.ring{border:2px solid var(--field);}
  .type-chip{border-radius:999px;padding:6px 12px;font-size:14px;font-weight:500;background:var(--field);color:var(--muted);border:none;cursor:pointer;}
  .toggle{width:46px;height:26px;border-radius:999px;background:#D8D2E0;position:relative;border:none;cursor:pointer;flex-shrink:0;}
  body.dark .toggle{background:#4A4458;}
  .toggle .knob{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:999px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .15s;}
  .toggle.on .knob{left:22px;}
  .rowbox{display:flex;align-items:center;justify-content:space-between;border-radius:16px;padding:10px 12px;margin-bottom:12px;background:var(--field);}
  .rowbox.accent{background:var(--lilac-soft);}
  .save{flex:1;border-radius:16px;padding:12px;font-weight:600;background:var(--lilac);color:#3F2F52;box-shadow:0 6px 16px -8px rgba(120,110,160,.6);border:none;cursor:pointer;}
  .del{border-radius:16px;padding:12px 16px;font-weight:600;background:#FFEDEB;color:#D9776F;border:none;cursor:pointer;}
  body.dark .del{background:#4A2E2C;}
  .hidden{display:none;}
  .pagettl{font-size:18px;font-weight:700;color:var(--plum);margin:0;}
  /* print / PDF */
  #print-area{display:none;}
  @media print{
    body{background:#fff;}
    body>.wrap,nav.tabs,#toast,#modal-root,#import-file,.fab,#fab-layer{display:none!important;}
    #print-area{display:block!important;padding:24px;color:#111;font-family:'Sarabun',sans-serif;}
    #print-area h1{font-size:20px;margin:0 0 14px;}
    #print-area .cards{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
    #print-area .cards>div{border:1px solid #ddd;border-radius:10px;padding:8px 12px;font-size:13px;}
    #print-area .cards>div.tot{font-weight:700;background:#f3eefb;}
    #print-area table{width:100%;border-collapse:collapse;font-size:12px;}
    #print-area th,#print-area td{border:1px solid #ddd;padding:6px 8px;text-align:left;}
    #print-area th{background:#f6f3fb;}
    #print-area .ft{margin-top:14px;font-size:11px;color:#888;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="top"></div>
  <main id="main"></main>
</div>
<nav class="tabs"><div class="inner">
  <button data-action="nav" data-view="home"     id="tab-home"><span class="ic">📅</span>หน้าหลัก</button>
  <button data-action="nav" data-view="manage"   id="tab-manage"><span class="ic">🎀</span>จัดการเวร</button>
  <button data-action="nav" data-view="ot"       id="tab-ot"><span class="ic">💰</span>OT</button>
  <button data-action="nav" data-view="stats"    id="tab-stats"><span class="ic">📊</span>สรุป</button>
  <button data-action="nav" data-view="settings" id="tab-settings"><span class="ic">⚙️</span>ตั้งค่า</button>
</div></nav>
<button class="fab" id="fab" data-action="fabtoggle">＋</button>
<div id="fab-layer"></div>
<div id="toast"></div>
<div id="modal-root"></div>
<div id="print-area"></div>
<input id="import-file" type="file" accept="application/json,.json" class="hidden" />

<script>
"use strict";
if ("serviceWorker" in navigator) window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});

/* ===== constants ===== */
var KEY_DUTIES="pdc:duties:v1",KEY_ENTRIES="pdc:entries:v1",KEY_MOODS="pdc:moods:v1",KEY_SETTINGS="pdc:settings:v1";
var KEY_OTRATES="pdc:otrates:v1",KEY_OTENTRIES="pdc:otentries:v1",KEY_NOTES="pdc:notes:v1",KEY_ECLAIMS="pdc:eclaims:v1";
var AVATARS=["👩🏻‍⚕️","🧑🏻‍⚕️","👨🏻‍⚕️","🌸","🩺","🐰","🐱","🌷","⭐","💗","☕","🦋"];
var OT_TYPES=[{value:"morning",label:"เวรเช้า",fixed:true},{value:"evening",label:"เวรบ่าย/ดึก",fixed:true},{value:"ward",label:"OT ward (ราย ชม.)",fixed:false}];
function otTypeLabel(v){for(var i=0;i<OT_TYPES.length;i++)if(OT_TYPES[i].value===v)return OT_TYPES[i].label;return v;}
var PALETTE=["#AFCBFF","#B8D8FF","#FFE7A7","#D8B4E2","#FFAAA5","#F7C3CF","#C7B8EA","#BFE8D8","#E6A4B4","#8DD9A0","#FFFDF8","#F7FBFF"];
var TEXT_COLORS=["#374151","#1E3A5F","#6B5800","#5A3D6B","#8B2E29","#8B3A4D","#6B2E3D","#1F5C57","#FFFFFF"];
var EMOJIS=["🩺","☀️","🌙","🌸","🏠","🌴","📚","💉","🌷","⭐","💗","☕","🔆","🌿","🩹","🧁","💰","🌼"];
var MOODS=["😊","😁","🙂","😌","😴","🥲","😩","🤒","❤️","⭐"];
var DUTY_TYPES=[
  {value:"Work",label:"งานเวร",chip:"#AFCBFF"},
  {value:"Off",label:"หยุด",chip:"#FFAAA5"},
  {value:"Vacation",label:"ลาพักร้อน",chip:"#F7C3CF"},
  {value:"Training",label:"อบรม",chip:"#E6A4B4"},
  {value:"Meeting",label:"ประชุม",chip:"#C7B8EA"},
  {value:"Personal",label:"ส่วนตัว",chip:"#BFE8D8"},
  {value:"Other",label:"อื่น ๆ",chip:"#FFE7A7"}
];
var DEFAULT_DUTIES=[
  {id:"d_rr",name:"RR",emoji:"🩺",bg:"#AFCBFF",fg:"#1E3A5F",type:"Work",allDay:false,start:"08:00",end:"16:00",note:"",desc:"",isMain:true,hidden:false,paid:false,payType:"fixed",amount:0,rate:0,inOT:false},
  {id:"d_r1",name:"R1",emoji:"☀️",bg:"#FFE7A7",fg:"#6B5800",type:"Work",allDay:false,start:"08:00",end:"20:00",note:"",desc:"",isMain:true,hidden:false,paid:false,payType:"fixed",amount:0,rate:0,inOT:false},
  {id:"d_r4",name:"R4",emoji:"🌸",bg:"#D8B4E2",fg:"#5A3D6B",type:"Work",allDay:false,start:"16:00",end:"00:00",note:"",desc:"",isMain:true,hidden:false,paid:false,payType:"fixed",amount:0,rate:0,inOT:false},
  {id:"d_opd",name:"OP(D)",emoji:"💉",bg:"#B8D8FF",fg:"#1E4D7B",type:"Work",allDay:false,start:"08:00",end:"16:00",note:"",desc:"",isMain:true,hidden:false,paid:false,payType:"fixed",amount:0,rate:0,inOT:false},

function pad(n){return ("0"+n).slice(-2);}
function keyOf(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function uid(){return Math.random().toString(36).slice(2,9);}
function dutyIsMain(d){return d.isMain!=null?d.isMain:(d.type==="Work"||d.type==="Off");}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function load(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function fmtMoney(n){return n.toLocaleString("th-TH",{maximumFractionDigits:0});}

function buildGrid(y,m){var sw=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),c=[],i;
  for(i=0;i<sw;i++)c.push(null);for(i=1;i<=dim;i++)c.push(new Date(y,m,i));while(c.length%7!==0)c.push(null);return c;}
function shiftHours(d){if(d.allDay||!d.start||!d.end)return 0;var a=d.start.split(":"),b=d.end.split(":");
  var s=(+a[0])*60+(+a[1]),e=(+b[0])*60+(+b[1]);if(e<=s)e+=1440;return (e-s)/60;}
function dutyPay(d){if(!d.paid)return 0;return d.payType==="hourly"?num(d.rate)*shiftHours(d):num(d.amount);}

function addEntry(id){

  if(d&&dutyIsMain(d)){var nx=new Date(S.selected+"T00:00:00");nx.setDate(nx.getDate()+1);S.selected=keyOf(nx);
    if(nx.getMonth()!==S.cursor.m||nx.getFullYear()!==S.cursor.y)S.cursor={y:nx.getFullYear(),m:nx.getMonth()};
    flash(d.name+" ✓ ไปวันถัดไป →");}else{flash("เพิ่ม "+(d?d.name:"เวร")+" แล้ว ✨");}

}

function saveDutyObj(f){if(!f.name.trim()){flash("ใส่ชื่อเวรก่อนนะ");return;}f.name=f.name.trim();
  if(f.id){for(var i=0;i<S.duties.length;i++)if(S.duties[i].id===f.id){S.duties[i]=f;break;}}else{f.id="u_"+uid();S.duties.push(f);}
  pD();closeModal();flash("บันทึกเวรแล้ว 🌸");render();}
function duplicateDuty(id){var d=dutyById(id);if(!d)return;var c=JSON.parse(JSON.stringify(d));c.id="u_"+uid();c.name=d.name+" (สำเนา)";
  var idx=S.duties.indexOf(d);S.duties.splice(idx+1,0,c);pD();flash("ทำสำเนาแล้ว");render();}
function toggleHide(id){var d=dutyById(id);if(!d)return;d.hidden=!d.hidden;pD();render();}
function deleteDuty(id){var aff=0;Object.keys(S.entries).forEach(function(k){S.entries[k].forEach(function(e){if(e.dutyId===id)aff++;});});
  confirmAsk(aff>0?("ลบเวรนี้ และจะลบการบันทึกในปฏิทิน "+aff+" รายการด้วย ตกลงไหม?"):"ลบเวรนี้ใช่ไหม?",function(){
    S.duties=S.duties.filter(function(d){return d.id!==id;});
    var ne={};Object.keys(S.entries).forEach(function(k){var f=S.entries[k].filter(function(e){return e.dutyId!==id;});if(f.length)ne[k]=f;});
    S.entries=ne;pD();pE();flash("ลบเวรแล้ว");render();});}
function moveDuty(id,dir){var d=dutyById(id);if(!d)return;var main=dutyIsMain(d);
  var group=S.duties.filter(function(x){return dutyIsMain(x)===main;});
  var gi=group.indexOf(d),tgt=group[gi+dir];if(!tgt)return;
  var ia=S.duties.indexOf(d),ib=S.duties.indexOf(tgt);S.duties[ia]=tgt;S.duties[ib]=d;pD();render();}
function orderedDuties(){var m=[],s=[];S.duties.forEach(function(d){(dutyIsMain(d)?m:s).push(d);});return m.concat(s);}
function exportData(){var p={app:"shiftbloom",version:2,exportedAt:new Date().toISOString(),duties:S.duties,entries:S.entries,moods:S.moods,settings:S.settings,otRates:S.otRates,otEntries:S.otEntries,notes:S.notes,entryClaims:S.entryClaims};
  var b=new Blob([JSON.stringify(p,null,2)],{type:"application/json"}),u=URL.createObjectURL(b),a=document.createElement("a"),d=new Date();
  a.href=u;a.download="shiftbloom-backup-"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+".json";document.body.appendChild(a);a.click();a.remove();

function importData(file){if(!file)return;var r=new FileReader();r.onload=function(){try{var data=JSON.parse(r.result);
  if(!Array.isArray(data.duties)||typeof data.entries!=="object"||data.entries===null)throw 0;

/* ===== helpers for month aggregates ===== */
function monthEntries(){var c=S.cursor,pre=c.y+"-"+pad(c.m+1)+"-",out=[];
  Object.keys(S.entries).forEach(function(k){if(k.indexOf(pre)!==0)return;S.entries[k].forEach(function(e){var du=dutyById(e.dutyId);if(du)out.push({k:k,e:e,du:du});});});return out;}
function otTypeForDuty(du){if(du.payType==="hourly")return "ward";if(!du.allDay&&du.start)return (+du.start.split(":")[0])<12?"morning":"evening";return "evening";}
function otItems(){
  var items=[];
  Object.keys(S.entries).forEach(function(k){S.entries[k].forEach(function(e){
    var du=dutyById(e.dutyId);if(!du||!du.inOT)return;
    items.push({date:k,claimDate:S.entryClaims[e.id]||"",type:otTypeForDuty(du),hours:shiftHours(du),
      rate:du.payType==="hourly"?num(du.rate):num(du.amount),amount:Math.round(dutyPay(du)),
      ward:"",location:"",note:du.name,source:"duty",refId:e.id,emoji:du.emoji,bg:du.bg});});});
  S.otEntries.forEach(function(o){items.push(Object.assign({},o,{source:"manual",refId:o.id}));});
  return items;
}
function otEff(o){return (S.settings.otGroupBy==="claim"&&o.claimDate)?o.claimDate:o.date;}
function otMonthList(){var c=S.cursor,pre=c.y+"-"+pad(c.m+1)+"-";return otItems().filter(function(o){return (otEff(o)||"").indexOf(pre)===0;});}
function otMonthSum(){var s={morning:0,evening:0,ward:0,total:0,hours:0};otMonthList().forEach(function(o){var a=num(o.amount);s[o.type]=(s[o.type]||0)+a;s.total+=a;s.hours+=num(o.hours);});return s;}

function renderDash(){
  var now=new Date(),h=now.getHours();
  var g=h<12?"☀️ สวัสดีตอนเช้า":h<17?"🌤 สวัสดีตอนบ่าย":"🌙 สวัสดีตอนค่ำ";
  var todayKey=keyOf(now),tl=(S.entries[todayKey]||[]).map(function(e){return dutyById(e.dutyId);}).filter(Boolean);
  var todayTxt,cd="";
  if(tl.length===0){todayTxt="วันนี้ว่าง — Enjoy your day 🌷";}
  else{
    todayTxt=tl.map(function(d){return esc(d.emoji+" "+d.name);}).join(", ");
    var timed=tl.filter(function(d){return !d.allDay&&d.end;});
    if(timed.length){
      var best=null;timed.forEach(function(d){var a=d.start.split(":"),b=d.end.split(":");
        var endMin=(+b[0])*60+(+b[1]);if(endMin<=(+a[0])*60+(+a[1]))endMin+=1440;
        var ed=new Date(now);ed.setHours(0,0,0,0);ed.setMinutes(endMin);
        if(ed>now&&(!best||ed<best))best=ed;});
      if(best){var diff=Math.floor((best-now)/60000);cd=' · <span class="cd">อีก '+Math.floor(diff/60)+' ชม. '+(diff%60)+' น. เลิกเวร ⏱</span>';}
    }
  }
  var me=monthEntries();

  me.forEach(function(x){if(x.du.type==="Work")nWork++;if(x.du.type==="Off")nOff++;if(x.du.type==="Training")nTrain++;if(!dutyIsMain(x.du))nSub++;});
  var ot=otMonthSum(),otInc=ot.total,otHr=ot.hours;

  Object.keys(S.moods).forEach(function(k){if(k.indexOf(pre)===0){mc[S.moods[k]]=(mc[S.moods[k]]||0)+1;if(mc[S.moods[k]]>topC){topC=mc[S.moods[k]];topMood=S.moods[k];}}});

    ["⏱ ชั่วโมง OT",otHr.toFixed(otHr%1?1:0),"ชม.","#FFE7A7","#6B5800"],

    ["🏥 OT ward","฿"+fmtMoney(ot.ward),"","#BFE8D8","#1F5C57"],
    ["📚 อบรม",nTrain,"ครั้ง","#F3C9D6","#6B2E3D"]

  var av=esc(S.settings.avatar||"👩🏻‍⚕️");

    '<button class="btn uname" data-action="editname" style="padding:0;text-align:left">'+esc(S.settings.name||"ตั้งชื่อ")+' ✎</button></div></div>'+

    '<div style="font-size:12px;color:#5C4E73;margin-top:2px;opacity:.85">'+TH_MONTHS[S.cursor.m]+' '+(S.cursor.y+543)+'</div>'+

  h2+='</div></div>';
  return h2;
}

function openMoodSheet(){
  if(!S.selected){flash("เลือกวันก่อนนะ 💗");return;}
  var h='<div class="overlay"><div class="sheet"><div class="grip"></div><h3>อารมณ์วันนี้</h3><div class="row" style="flex-wrap:wrap;gap:8px;justify-content:center">';
  MOODS.forEach(function(m){h+='<button class="emoji-pick'+(S.moods[S.selected]===m?' on':'')+'" style="width:48px;height:48px;font-size:24px" data-action="pickmood" data-m="'+esc(m)+'">'+esc(m)+'</button>';});
  h+='</div></div></div>';document.getElementById("modal-root").innerHTML=h;
}
function openAvatarEdit(){
  var h='<div class="overlay"><div class="sheet"><div class="grip"></div><h3>เลือก Avatar</h3>';
  h+='<div class="row" style="flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px" id="av-row">';
  AVATARS.forEach(function(a){h+='<button class="emoji-pick'+(S.settings.avatar===a?' on':'')+'" style="width:46px;height:46px;font-size:24px" data-av="'+esc(a)+'">'+esc(a)+'</button>';});
  h+='</div><div class="field"><label>หรือพิมพ์ emoji เอง</label><input type="text" id="av-in" maxlength="8" value="'+esc(S.settings.avatar||"")+'" style="text-align:center;font-size:22px"></div>';
  h+='<button class="save" id="av-save" style="width:100%">บันทึก</button></div></div>';
  document.getElementById("modal-root").innerHTML=h;
  document.querySelectorAll("#av-row [data-av]").forEach(function(b){b.onclick=function(){document.getElementById("av-in").value=b.getAttribute("data-av");
    document.querySelectorAll("#av-row [data-av]").forEach(function(x){x.classList.remove("on");});b.classList.add("on");};});
  document.getElementById("av-save").onclick=function(){S.settings.avatar=document.getElementById("av-in").value.trim()||"👩🏻‍⚕️";pS();closeModal();render();flash("เปลี่ยน avatar แล้ว 🌸");};
}

/* ===== events ===== */
document.addEventListener("click",function(e){
  var ov=e.target.closest(".overlay");if(ov&&e.target===ov){closeModal();return;}
  var el=e.target.closest("[data-action]");if(!el)return;var a=el.getAttribute("data-action");
  if(a==="nav"){S.view=el.getAttribute("data-view");toggleFab(false);render();window.scrollTo(0,0);}
  else if(a==="month"){var d=new Date(S.cursor.y,S.cursor.m+ +el.getAttribute("data-d"),1);S.cursor={y:d.getFullYear(),m:d.getMonth()};render();}
  else if(a==="today"){var t=new Date();S.cursor={y:t.getFullYear(),m:t.getMonth()};S.selected=keyOf(t);render();}
  else if(a==="day"){S.selected=el.getAttribute("data-key");render();}
  else if(a==="addentry"){addEntry(el.getAttribute("data-id"));}
  else if(a==="rmentry"){removeEntry(el.getAttribute("data-key"),el.getAttribute("data-eid"));}
  else if(a==="editnote"){openNote(el.getAttribute("data-key"),el.getAttribute("data-eid"));}
  else if(a==="mood"){setMood(el.getAttribute("data-m"));}
  else if(a==="addduty"){toggleFab(false);openDutyForm(null);}
  else if(a==="editduty"){openDutyForm(dutyById(el.getAttribute("data-id")));}
  else if(a==="dupduty"){duplicateDuty(el.getAttribute("data-id"));}
  else if(a==="hideduty"){toggleHide(el.getAttribute("data-id"));}
  else if(a==="delduty"||a==="delduty-modal"){deleteDuty(el.getAttribute("data-id"));}
  else if(a==="move"){moveDuty(el.getAttribute("data-id"),+el.getAttribute("data-dir"));}
  else if(a==="sumfilter"){S.summaryFilter=el.getAttribute("data-f");render();}
  else if(a==="addot"){toggleFab(false);openOTForm(null);}
  else if(a==="fabtoggle"){toggleFab();}
  else if(a==="fabclose"){toggleFab(false);}
  else if(a==="addentry-sheet"){toggleFab(false);openDutyPick();}
  else if(a==="pickduty"){var did=el.getAttribute("data-id");closeModal();addEntry(did);}
  else if(a==="addmood-sheet"){toggleFab(false);openMoodSheet();}
  else if(a==="pickmood"){setMood(el.getAttribute("data-m"));closeModal();}
  else if(a==="addnote"){toggleFab(false);openDailyNote(null);}
  else if(a==="editdnote"){openDailyNote(el.getAttribute("data-id"));}
  else if(a==="rmnote"){deleteNote(el.getAttribute("data-id"));}
  else if(a==="rmnote-modal"){deleteNote(el.getAttribute("data-id"));closeModal();}
  else if(a==="editavatar"){openAvatarEdit();}
  else if(a==="claimset"){openClaimSet(el.getAttribute("data-key"),el.getAttribute("data-eid"));}
  else if(a==="otgroup"){S.settings.otGroupBy=el.getAttribute("data-g");pS();render();}
  else if(a==="editot"){var oid=el.getAttribute("data-id"),o=null;S.otEntries.forEach(function(x){if(x.id===oid)o=x;});openOTForm(o);}
  else if(a==="delot"){deleteOT(el.getAttribute("data-id"));}
  else if(a==="otcsv"){exportOTCSV();}
  else if(a==="otpdf"){exportOTPDF();}
  else if(a==="editname"){openNameEdit();}
  else if(a==="darktoggle"){S.settings.dark=!S.settings.dark;pS();applyTheme();render();}
  else if(a==="export"){exportData();}
  else if(a==="import"){document.getElementById("import-file").click();}
  else if(a==="reset"){resetApp();}
});
document.addEventListener("input",function(e){
  if(e.target.id==="set-name"){S.settings.name=e.target.value;pS();}
  else if(e.target.id==="ot-rate-morning"){S.otRates.morning=num(e.target.value);pOR();}
  else if(e.target.id==="ot-rate-evening"){S.otRates.evening=num(e.target.value);pOR();}
  else if(e.target.id==="ot-rate-ward"){S.otRates.ward=num(e.target.value);pOR();}
});
document.getElementById("import-file").addEventListener("change",function(e){importData(e.target.files[0]);e.target.value="";});

/* live countdown refresh on home */
setInterval(function(){if(S.view==="home")topEl.innerHTML=renderDash();},30000);

applyTheme();render();
</script>
</body>
</html>
